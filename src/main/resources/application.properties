# Database — values come from the environment; the defaults after ':' are for local dev only.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/buzz_car_sales?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Close the persistence context at the end of the service layer rather than
# keeping it open through view rendering.
spring.jpa.open-in-view=false

spring.application.name=buzz-car-sales
server.port=8080

# OpenAPI / Swagger UI — interactive docs at /swagger-ui.html, raw spec at /v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# SMSPortal — set SMSPORTAL_API_KEY / SMSPORTAL_API_SECRET as environment variables.
# Never commit real credentials. The previously committed keys must be rotated.
smsportal.api.key=${SMSPORTAL_API_KEY:}
smsportal.api.secret=${SMSPORTAL_API_SECRET:}
smsportal.api.url=${SMSPORTAL_API_URL:https://rest.smsportal.com/BulkMessages}
