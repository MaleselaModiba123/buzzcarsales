# Test configuration — uses an in-memory H2 database so tests need no external MySQL.
spring.datasource.url=jdbc:h2:mem:buzz_test;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Dummy SMSPortal values so @Value bindings resolve during tests.
smsportal.api.key=test-key
smsportal.api.secret=test-secret
smsportal.api.url=https://rest.smsportal.com/BulkMessages
