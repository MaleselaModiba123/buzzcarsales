# Integration-test config — runs against a REAL MySQL (not H2) so it exercises
# MySQL-specific schema generation (reserved words), DDL, and the native queries.
# Connection is env-overridable; defaults target a local MySQL. A dedicated
# database is used so dev data is never touched, and create-drop rebuilds the
# full schema each run.
spring.datasource.url=${IT_DB_URL:jdbc:mysql://localhost:3306/buzz_car_sales_it?createDatabaseIfNotExist=true}
spring.datasource.username=${IT_DB_USERNAME:root}
spring.datasource.password=${IT_DB_PASSWORD:password}
# Override the H2 driver inherited from the base test application.properties.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false

# Dummy SMSPortal values so @Value bindings resolve during the test.
smsportal.api.key=test-key
smsportal.api.secret=test-secret
smsportal.api.url=https://rest.smsportal.com/BulkMessages
